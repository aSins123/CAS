<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库搜索</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 10px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background-color: #0078d7;
            color: white;
            padding: 12px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 500;
            text-align: center;
        }
        .search-bar {
            display: flex;
            gap: 8px;
            width: 100%;
        }
        .search-bar input {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .search-bar button {
            padding: 8px 16px;
            background-color: #005a9e;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .main {
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 180px);
        }

        .sidebar {
            width: 100%;
            background-color: #f0f2f5;
            border-bottom: 1px solid #e1e4e8;
            max-height: 260px;
            overflow-y: auto;
            padding: 10px;
        }
        .result-item {
            padding: 10px;
            margin-bottom: 6px;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        .result-item:hover,
        .result-item.active {
            background-color: #e8f0fe;
            border-left-color: #0078d7;
        }
        .result-item .title {
            font-size: 14px;
            color: #333;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .result-item .source {
            font-size: 12px;
            color: #666;
        }
        .highlight {
            background-color: #fff380;
            color: #d97706;
            padding: 0 2px;
            border-radius: 2px;
        }

        .content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }
        .question-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .question-meta {
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
            padding: 6px 10px;
            background-color: #f1f5f9;
            border-radius: 4px;
        }
        .options {
            margin-bottom: 15px;
        }
        .option-item {
            padding: 8px 12px;
            margin-bottom: 6px;
            background-color: #f8fafc;
            border-radius: 4px;
            font-size: 14px;
            color: #475569;
        }
        .answer-section {
            margin-bottom: 15px;
            padding: 10px 12px;
            background-color: #dcfce7;
            border-radius: 4px;
            border-left: 4px solid #22c55e;
        }
        .answer-label {
            font-size: 14px;
            color: #166534;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .answer-content {
            font-size: 15px;
            color: #14532d;
            font-weight: 500;
        }
        .analysis-section {
            padding: 12px;
            background-color: #fef3c7;
            border-radius: 4px;
            border-left: 4px solid #f59e0b;
        }
        .analysis-label {
            font-size: 14px;
            color: #92400e;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .analysis-content {
            font-size: 14px;
            color: #78350f;
            line-height: 1.5;
        }
        .empty-state, .status-text, .loading-state {
            text-align: center;
            padding: 30px 15px;
            color: #94a3b8;
        }

        /* PC端横排 */
        @media (min-width: 768px) {
            .header {
                flex-direction: row;
                justify-content: space-between;
                padding: 16px 20px;
            }
            .header h1 {
                text-align: left;
                font-size: 20px;
            }
            .search-bar {
                width: 320px;
            }
            .main {
                flex-direction: row;
            }
            .sidebar {
                width: 300px;
                max-height: none;
                height: calc(100vh - 140px);
                border-bottom: none;
                border-right: 1px solid #e1e4e8;
            }
            .content {
                padding: 24px;
            }
            .question-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>知识库</h1>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="输入关键词搜索题目...">
                <button id="searchBtn">搜索</button>
            </div>
        </div>
        <div class="main">
            <div class="sidebar" id="resultList">
                <div class="loading-state">正在加载数据库，请稍候...</div>
            </div>
            <div class="content" id="detailContent">
                <div class="empty-state">
                    <p>请先加载数据库并搜索题目</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script>
        let db;
        let currentResults = [];
        let SQL;
        let searchDebounceTimer = null;
        let currentSearchKeyword = '';

        async function initApp() {
            try {
                SQL = await initSqlJs({
                    locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
                });
                await loadLocalDb();
            } catch (error) {
                document.getElementById('resultList').innerHTML = '<div class="status-text">数据库加载失败！请确认data.db和本HTML文件在同一目录</div>';
            }
        }

        async function loadLocalDb() {
            try {
                const response = await fetch('data.db');
                if (!response.ok) throw new Error("找不到 data.db");
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                db = new SQL.Database(data);
                document.getElementById('resultList').innerHTML = '<div class="status-text">数据库加载成功！请在搜索框输入关键词搜索</div>';
            } catch (error) {
                document.getElementById('resultList').innerHTML = '<div class="status-text">data.db 加载失败，请放在同一目录</div>';
            }
        }

        function highlightKeyword(text, keyword) {
            if (!text || !keyword) return text;
            const esc = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return text.replace(new RegExp(esc, 'gi'), m => `<span class="highlight">${m}</span>`);
        }

        function searchQuestions(keyword) {
            currentSearchKeyword = keyword;
            if (!db) return;
            if (!keyword.trim()) {
                currentResults = [];
                renderResults();
                return;
            }
            try {
                const stmt = db.prepare(`
                    SELECT 题目, 选项A, 选项B, 选项C, 选项D, 选项E, 选项F, 答案, 解析, 题库, '默认题库' as 来源 FROM "默认题库" WHERE 题目 LIKE ?
                    UNION ALL
                    SELECT 题目, 选项A, 选项B, 选项C, 选项D, 选项E, 选项F, 答案, 解析, 题库, '其他题库' as 来源 FROM "其他题库" WHERE 题目 LIKE ?
                `);
                const wd = `%${keyword}%`;
                stmt.bind([wd, wd]);
                currentResults = [];
                while (stmt.step()) currentResults.push(stmt.getAsObject());
                stmt.free();
                renderResults();
            } catch (e) {}
        }

        function debouncedSearch(keyword) {
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => searchQuestions(keyword), 300);
        }

        function renderResults() {
            const el = document.getElementById('resultList');
            el.innerHTML = '';
            if (currentResults.length === 0) {
                el.innerHTML = '<div class="empty-state"><p>未找到相关题目</p></div>';
                return;
            }
            currentResults.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'result-item';
                const title = highlightKeyword(item.题目, currentSearchKeyword);
                div.innerHTML = `<div class="title">${title}</div><div class="source">来源: ${item.来源} | 题库: ${item.题库}</div>`;
                div.onclick = () => showDetail(index);
                el.appendChild(div);
            });
        }

        function showDetail(index) {
            const item = currentResults[index];
            const content = document.getElementById('detailContent');
            let opts = '';
            ['A','B','C','D','E','F'].forEach(l => {
                const t = item[`选项${l}`];
                if (t && t.trim()) opts += `<div class="option-item"><strong>${l}.</strong> ${t}</div>`;
            });
            content.innerHTML = `
                <div class="question-title">${item.题目}</div>
                <div class="question-meta">题库：${item.题库} | 来源：${item.来源}</div>
                <div class="options">${opts}</div>
                <div class="answer-section">
                    <div class="answer-label">参考答案</div>
                    <div class="answer-content">${item.答案}</div>
                </div>
                <div class="analysis-section">
                    <div class="analysis-label">解析</div>
                    <div class="analysis-content">${item.解析 || '暂无解析'}</div>
                </div>
            `;
            document.querySelectorAll('.result-item').forEach((e,i) => e.classList.toggle('active', i===index));
        }

        window.addEventListener('load', initApp);
        document.getElementById('searchBtn').onclick = () => searchQuestions(document.getElementById('searchInput').value.trim());
        document.getElementById('searchInput').addEventListener('input', e => debouncedSearch(e.target.value.trim()));
        document.getElementById('searchInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') searchQuestions(e.target.value.trim());
        });
    </script>
</body>
</html>
